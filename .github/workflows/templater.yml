name: Repo Factory

on:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}

    steps:
      - uses: actions/checkout@v4

      - name: Validar CSV
        run: |
          [ -f repos.csv ] || { echo "❌ repos.csv no encontrado"; exit 1; }

      - name: Construir matriz
        id: build
        run: |
          python3 scripts/build_matrix.py > matrix.json

          echo "Matrix generada:"
          cat matrix.json

          echo "matrix=$(cat matrix.json)" >> $GITHUB_OUTPUT


  create:
    needs: prepare
    runs-on: ubuntu-latest

    strategy:
      matrix:
        repo: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - name: Crear repositorio
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          OWNER: your-org
        run: |
          NAME="${{ matrix.repo.name }}"
          DESC="${{ matrix.repo.description }}"
          TEMPLATE="${{ matrix.repo.template }}"

          echo "➡️ Creando: $NAME"

          # Verificar si existe
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $ADMIN_TOKEN" \
            https://api.github.com/repos/$OWNER/$NAME)

          if [ "$STATUS" = "200" ]; then
            echo "⚠️ Ya existe, se omite"
            exit 0
          fi

          # Crear repo
          curl -s -X POST "https://api.github.com/repos/$OWNER/$TEMPLATE/generate" \
            -H "Authorization: token $ADMIN_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{
              \"owner\": \"$OWNER\",
              \"name\": \"$NAME\",
              \"description\": \"$DESC\",
              \"private\": true
            }"

          echo "✅ Creado: $NAME"
